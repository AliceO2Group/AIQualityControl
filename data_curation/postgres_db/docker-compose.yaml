 services:
  db:
    image: postgres:15
    container_name: data-curation-online-dqm-test
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./postgres-backups:/backups
      - ./init:/docker-entrypoint-initdb.d